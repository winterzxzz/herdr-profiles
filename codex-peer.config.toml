model = "gpt-5.6-sol"
model_reasoning_effort = "medium"
model_verbosity = "medium"
personality = "pragmatic"
approval_policy = "never"
sandbox_mode = "read-only"
web_search = "disabled"

[features]
hooks = true
multi_agent = false
memories = false

[[hooks.PreToolUse]]
matcher = "^(Bash|apply_patch|Edit|Write|Agent|spawn_agent)$"

[[hooks.PreToolUse.hooks]]
type = "command"
command = 'python3 "$CODEX_HOME/herdr-profile-policy.py" peer'
timeout = 10
statusMessage = "Enforcing peer policy"
