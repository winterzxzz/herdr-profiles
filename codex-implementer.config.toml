model = "gpt-5.6-sol"
model_reasoning_effort = "medium"
model_verbosity = "medium"
personality = "pragmatic"
approval_policy = "never"
sandbox_mode = "workspace-write"
web_search = "disabled"

[sandbox_workspace_write]
network_access = false

[features]
hooks = true
multi_agent = false
memories = false

[[hooks.PreToolUse]]
matcher = "^(Bash|Agent|spawn_agent)$"

[[hooks.PreToolUse.hooks]]
type = "command"
command = 'python3 "$CODEX_HOME/herdr-profile-policy.py" implementer'
timeout = 10
statusMessage = "Enforcing implementer policy"
